name: Deploy para Alwaysdata

on:
  push:
    branches:
      - main  # Certifique-se de que sua branch principal se chama 'main'

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout do código
        uses: actions/checkout@v3

      - name: Deploy via SFTP (Para subpasta)
        uses: wlixcc/SFTP-Deploy-Action@v1.2.4
        with:
          server: ${{ secrets.ALWAYSDATA_SERVER }}
          username: ${{ secrets.ALWAYSDATA_USER }}
          password: ${{ secrets.ALWAYSDATA_PASSWORD }}
          port: 22
          local_path: './'
          # Aqui é onde a mágica acontece:
          remote_path: 'www/agencia-led/' 
          sftp_only: true
          delete_remote_files: false